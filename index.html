<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家庭网络监控中心</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="floorplan.js"></script>
</head>
<body class="bg-black overflow-hidden">
    <div id="starfield" class="fixed inset-0 z-0"></div>

    <div class="relative z-10 w-full h-screen flex flex-col">
        <!-- 顶部标题栏 -->
        <header class="header-container">
            <div class="header-decoration left"></div>
            <div class="header-content">
                <h1 class="main-title">
                    <span class="title-icon">◈</span>
                    家庭网络监控中心
                    <span class="title-icon">◈</span>
                </h1>
                <div class="header-status-bar">
                    <div class="status-tag">
                        <span class="status-label">当前时间</span>
                        <span class="status-value" id="currentTime">--:--:--</span>
                    </div>
                </div>
            </div>
            <div class="header-decoration right"></div>
        </header>

        <!-- 主体内容区 -->
        <main class="flex-1 flex px-6 py-4 gap-6 overflow-hidden">
            <!-- 左侧面板 -->
            <aside class="side-panel left-panel">
                <!-- 光猫感知监控 -->
                <div class="data-card" id="ontCard">
                    <div class="card-header">
                        <div class="card-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="2" y="6" width="20" height="12" rx="2"/>
                                <circle cx="8" cy="12" r="2"/>
                                <circle cx="16" cy="12" r="2"/>
                                <path d="M2 10h2M20 10h2M6 18v2M18 18v2"/>
                            </svg>
                        </div>
                        <h3 class="card-title">光猫感知监控</h3>
                    </div>
                    <div class="card-body">
                        <!-- 基础信息 -->
                        <div class="info-section">
                            <div class="info-row">
                                <span class="info-label">宽带账号</span>
                                <span class="info-value" id="ontAccount">-</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">设备厂家</span>
                                <span class="info-value" id="ontVendor">-</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">设备型号</span>
                                <span class="info-value" id="ontModel">-</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">签约带宽</span>
                                <span class="info-value" id="ontBandwidth">-</span>
                            </div>
                        </div>

                        <!-- 感知评分概览 -->
                        <div class="score-overview">
                            <div class="score-main">
                                <span class="score-value" id="ontTotalScore">-</span>
                                <span class="score-label">总评分</span>
                            </div>
                            <div class="score-items">
                                <div class="score-item-mini">
                                    <span class="mini-value" id="ontWebScore">-</span>
                                    <span class="mini-label">网页</span>
                                </div>
                                <div class="score-item-mini">
                                    <span class="mini-value" id="ontVideoScore">-</span>
                                    <span class="mini-label">视频</span>
                                </div>
                                <div class="score-item-mini">
                                    <span class="mini-value" id="ontPingScore">-</span>
                                    <span class="mini-label">PING</span>
                                </div>
                                <div class="score-item-mini">
                                    <span class="mini-value" id="ontGameScore">-</span>
                                    <span class="mini-label">游戏</span>
                                </div>
                            </div>
                        </div>

                        <!-- 小区对比分析 -->
                        <div class="community-compare-section">
                            <div class="compare-header">
                                <span class="compare-title" id="compareTitle">小区对比</span>
                                <span class="compare-subtitle">光猫 vs 小区平均</span>
                            </div>
                            <div class="compare-chart" id="communityCompareChart"></div>
                        </div>

                        <!-- 感知趋势 -->
                        <div class="inline-selector">
                            <button class="inline-btn active" data-metric="web">网页</button>
                            <button class="inline-btn" data-metric="video">视频</button>
                            <button class="inline-btn" data-metric="game">游戏</button>
                            <button class="inline-btn" data-metric="download">下载</button>
                        </div>
                        <div class="trend-chart" id="ontTrendChart"></div>
                    </div>
                </div>
            </aside>

            <!-- 中央区域 -->
            <section class="center-area">
                <!-- 户型图 -->
                <div class="floor-plan-container" id="floorPlanContainer">
                    <div class="floor-plan-header">
                        <span class="floor-plan-title">户型图</span>
                        <div class="floor-plan-controls">
                            <button class="control-btn" id="btnReset" title="复位">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                                    <path d="M3 3v5h5"/>
                                </svg>
                            </button>
                            <button class="control-btn" id="btnAutoRotate" title="自动环绕">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 12a9 9 0 1 1-9-9"/>
                                    <path d="M21 3v6h-6"/>
                                </svg>
                            </button>
                            <button class="control-btn" id="btnZoomIn" title="放大">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="11" cy="11" r="8"/>
                                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                                    <line x1="11" y1="8" x2="11" y2="14"/>
                                    <line x1="8" y1="11" x2="14" y2="11"/>
                                </svg>
                            </button>
                            <button class="control-btn" id="btnZoomOut" title="缩小">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="11" cy="11" r="8"/>
                                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                                    <line x1="8" y1="11" x2="14" y2="11"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="floor-plan-3d" id="floorPlan3d"></div>
                    <div class="floor-plan-legend">
                        <div class="legend-item">
                            <span class="legend-dot ont"></span>
                            <span>光猫</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-dot router"></span>
                            <span>感知路由</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-dot mobile"></span>
                            <span>手机</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-dot tv"></span>
                            <span>电视</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-dot tablet"></span>
                            <span>平板</span>
                        </div>
                    </div>
                </div>


            </section>

            <!-- 右侧面板 -->
            <aside class="side-panel right-panel">
                <!-- 感知路由1 -->
                <div class="data-card" id="router1Card">
                    <div class="card-header">
                        <div class="card-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                                <path d="M2 17l10 5 10-5"/>
                                <path d="M2 12l10 5 10-5"/>
                            </svg>
                        </div>
                        <h3 class="card-title">感知路由PKKQGW</h3>
                    </div>
                    <div class="card-body">
                        <div class="info-section">
                            <div class="info-row">
                                <span class="info-label">在线状态</span>
                                <span class="info-value status-online" id="router1Status">-</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">运营商信息</span>
                                <span class="info-value" id="router1Operator">-</span>
                            </div>
                        </div>
                        <div class="inline-selector router-selector">
                            <button class="inline-btn active" data-metric="web">网页</button>
                            <button class="inline-btn" data-metric="video">视频</button>
                            <button class="inline-btn" data-metric="game">游戏</button>
                            <button class="inline-btn" data-metric="download">下载</button>
                        </div>
                        <div class="trend-chart" id="router1TrendChart"></div>
                    </div>
                </div>

                <!-- 感知路由2 -->
                <div class="data-card" id="router2Card">
                    <div class="card-header">
                        <div class="card-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                                <path d="M2 17l10 5 10-5"/>
                                <path d="M2 12l10 5 10-5"/>
                            </svg>
                        </div>
                        <h3 class="card-title">感知路由PKKQRW</h3>
                    </div>
                    <div class="card-body">
                        <div class="info-section">
                            <div class="info-row">
                                <span class="info-label">在线状态</span>
                                <span class="info-value status-online" id="router2Status">-</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">运营商信息</span>
                                <span class="info-value" id="router2Operator">-</span>
                            </div>
                        </div>
                        <div class="inline-selector router-selector">
                            <button class="inline-btn active" data-metric="web">网页</button>
                            <button class="inline-btn" data-metric="video">视频</button>
                            <button class="inline-btn" data-metric="game">游戏</button>
                            <button class="inline-btn" data-metric="download">下载</button>
                        </div>
                        <div class="trend-chart" id="router2TrendChart"></div>
                    </div>
                </div>
            </aside>
        </main>

        <!-- 底部信息栏 -->
        <footer class="footer-container">
            <div class="footer-item">
                <span class="footer-label">网络运营商</span>
                <span class="footer-value">中国电信</span>
            </div>
            <div class="footer-item">
                <span class="footer-label">数据来源</span>
                <span class="footer-value">MySQL数据库</span>
            </div>
            <div class="footer-item">
                <span class="footer-label">最后更新</span>
                <span class="footer-value" id="lastUpdate">-</span>
            </div>
        </footer>
    </div>

    <!-- 加载提示遮罩 -->
    <!-- <div class="loading-overlay visible" id="loadingOverlay">
        <div class="loading-spinner">
            <div class="spinner-ring"></div>
            <span class="loading-text">正在加载系统，请稍后...</span>
        </div>
    </div> -->

    <!-- 悬浮提示框 -->
    <div class="tooltip" id="tooltip"></div>

    <script src="app.js"></script>
</body>
</html>
